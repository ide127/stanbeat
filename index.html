<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Primary Meta Tags -->
  <title>StanBeat - K-pop & K-culture Word Search Game | Win a Korea Trip</title>
  <meta name="description"
    content="Choose your fandom, find K-pop and K-culture words fast, and compete with fans worldwide for a Korea trip. Free fan word search game." />
  <meta name="keywords"
    content="K-pop, K-culture, word game, fandom, StanBeat, Korean culture, word search, Korea trip, Seoul" />
  <meta name="author" content="StanBeat" />
  <meta name="theme-color" content="#FF0080" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
  <link rel="canonical" href="/" />
  <link rel="alternate" hreflang="en" href="/" />
  <link rel="alternate" hreflang="ko" href="/" />
  <link rel="alternate" hreflang="x-default" href="/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/" />
  <meta property="og:title" content="StanBeat - K-pop & K-culture Word Search Game | Win a Korea Trip" />
  <meta property="og:description"
    content="Choose your fandom, find K-pop and K-culture words fast, and compete with fans worldwide for a Korea trip." />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:site_name" content="StanBeat" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="ko_KR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="/" />
  <meta name="twitter:title" content="StanBeat - K-pop & K-culture Word Search Game | Win a Korea Trip" />
  <meta name="twitter:description"
    content="Choose your fandom, find K-pop and K-culture words fast, and compete with fans worldwide for a Korea trip." />
  <meta name="twitter:image" content="/icons/icon-512.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-512.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StanBeat" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon-512.svg" />

  <script>
    (() => {
      const origin = window.location.origin;
      const absolute = (path) => path.startsWith('http') ? path : `${origin}${path}`;
      const assignments = [
        ['link[rel="canonical"]', 'href', absolute('/')],
        ['link[hreflang="en"]', 'href', absolute('/')],
        ['link[hreflang="ko"]', 'href', absolute('/')],
        ['link[hreflang="x-default"]', 'href', absolute('/')],
        ['meta[property="og:url"]', 'content', absolute('/')],
        ['meta[property="og:image"]', 'content', absolute('/icons/icon-512.png')],
        ['meta[name="twitter:url"]', 'content', absolute('/')],
        ['meta[name="twitter:image"]', 'content', absolute('/icons/icon-512.png')],
      ];

      assignments.forEach(([selector, attribute, value]) => {
        const node = document.querySelector(selector);
        if (node) {
          node.setAttribute(attribute, value);
        }
      });
    })();
  </script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Oswald:wght@500;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap"
    rel="stylesheet">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Applixir Rewarded Video SDK v6 -->
  <!-- Self-hosted to avoid ad-blocker blocking of cdn.applixir.com -->
  <script type="text/javascript" src="/lib/player.js" async></script>

  <style>
    body {
      background-color: #000;
      font-family: 'Inter', 'Noto Sans Thai', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    h1,
    h2,
    .font-display {
      font-family: 'Oswald', sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1A0B2E;
    }

    ::-webkit-scrollbar-thumb {
      background: #FF0080;
      border-radius: 3px;
    }

    /* Neon Effects */
    .neon-text {
      text-shadow: 0 0 5px #FF0080, 0 0 10px #FF0080, 0 0 20px #FF0080;
    }

    .neon-cyan {
      text-shadow: 0 0 5px #00FFFF, 0 0 10px #00FFFF, 0 0 20px #00FFFF;
    }

    .neon-border {
      box-shadow: 0 0 10px #00FFFF, inset 0 0 5px #00FFFF;
    }

    .neon-glow-icon {
      filter: drop-shadow(0 0 4px #00FFFF) drop-shadow(0 0 8px #00FFFF);
    }

    /* Glitch Effect */
    .glitch {
      position: relative;
      animation: glitchFlicker 3s infinite;
    }

    @keyframes glitchFlicker {

      0%,
      90%,
      100% {
        opacity: 1;
        text-shadow: none;
      }

      91% {
        opacity: 0.8;
        text-shadow: -2px 0 #FF0080, 2px 0 #00FFFF;
      }

      92% {
        opacity: 1;
        text-shadow: 2px 0 #FF0080, -2px 0 #00FFFF;
      }

      93% {
        opacity: 0.9;
        text-shadow: none;
      }
    }

    /* Shimmer */
    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Marquee Ticker */
    @keyframes marquee {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    /* Slide In Menu */
    @keyframes slideIn {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(0);
      }
    }

    /* Heart Break Animation */
    @keyframes heartBreak {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      30% {
        transform: scale(1.3);
      }

      50% {
        transform: scale(0.8);
        opacity: 0.7;
      }

      70% {
        transform: scale(1.1) rotate(5deg);
      }

      100% {
        transform: scale(0) rotate(45deg);
        opacity: 0;
      }
    }

    .heart-break {
      animation: heartBreak 0.6s ease-out forwards;
    }

    /* Zoom In Transition */
    @keyframes zoomIn {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .zoom-in {
      animation: zoomIn 0.4s ease-in forwards;
    }

    /* Bounce +1 */
    @keyframes bounceUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(-20px);
        opacity: 0;
      }
    }

    .bounce-up {
      animation: bounceUp 0.8s ease-out forwards;
    }

    /* Squishy Button Press */
    .btn-squishy {
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-squishy:active {
      transform: scale(0.93);
    }

    .btn-squishy:focus-visible {
      outline: 2px solid #00FFFF;
      outline-offset: 3px;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.65);
    }

    /* RTL Support */
    html[dir="rtl"] .side-menu {
      left: auto;
      right: 0;
      transform-origin: right;
    }

    html[dir="rtl"] .ticker-text {
      direction: rtl;
    }

    /* Pulse Ring */
    @keyframes pulseRing {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 0, 128, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(255, 0, 128, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 128, 0);
      }
    }

    .pulse-ring {
      animation: pulseRing 2s infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .fandom-carousel-row-left,
      .fandom-carousel-row-right {
        transform: none;
      }
    }

    /* AppLixir video player overlay
       The SDK injects an iframe/video into #applixir_vanishing_div.
       We force it to appear on top of ALL React UI (modals, overlays, etc.).
       Visibility is managed by ApplixirProvider.ts (display: block/none). */
    #applixir_vanishing_div {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 99999;
      pointer-events: none;
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <!-- Required by Applixir SDK to inject the video frame -->
  <!-- CRITICAL: Do NOT add 'hidden' attribute - SDK injects an iframe/video here -->
  <div id="applixir_vanishing_div"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
